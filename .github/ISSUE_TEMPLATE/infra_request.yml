name: Infrastructure Request
description: Request a change to CI, Workers, or Pi fleet
labels: ["infrastructure"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Infrastructure Area
      options:
        - GitHub Actions / CI
        - Cloudflare Workers
        - Pi Fleet / Ollama
        - Salesforce Org
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What do you need?
    validations:
      required: true
  - type: textarea
    id: justification
    attributes:
      label: Justification
      description: Why is this change needed?
    validations:
      required: true
