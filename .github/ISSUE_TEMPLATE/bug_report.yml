name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug!
  - type: dropdown
    id: team
    attributes:
      label: Team
      options:
        - Platform (Apex / LWC)
        - Infrastructure (CI / Workers)
        - Agents (Pi Fleet / Ollama)
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0 — Outage / data loss
        - P1 — Broken feature, no workaround
        - P2 — Broken feature, workaround exists
        - P3 — Minor / cosmetic
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Agent Dashboard
        2. Click "Sync from Pi Fleet"
        3. See error
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        SF Org: Developer Edition
        Browser: Chrome 120
        Node: 20.x
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
