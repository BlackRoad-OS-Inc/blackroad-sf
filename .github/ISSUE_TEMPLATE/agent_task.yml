name: Agent Task
description: Create a task for a BlackRoad agent
labels: ["agent-task"]
body:
  - type: input
    id: task_id
    attributes:
      label: Task ID
      placeholder: "e.g. lucidia-001-sync"
  - type: dropdown
    id: agent
    attributes:
      label: Assigned Agent
      options:
        - Lucidia
        - Octavia
        - Cecilia
        - Auto-assign
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Task Description
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      placeholder: |
        - [ ] Criteria 1
        - [ ] Criteria 2
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      placeholder: List any tasks or PRs this depends on
